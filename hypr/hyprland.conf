# https://wiki.hyprland.org/Configuring/

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor = DP-3, 1920x1080@164.92, 4096x0, 1
monitor = DP-4, 5120x1440@240, 0x0, 1.25

$game_monitor = DP-3
$work_monitor = DP-4

###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = thunar
$menu = fuzzel
$volumeControl = pavucontrol
$calculator = qalculate-gtk

##################################
### XDG PORTALS FOR WAYLAND ###
##################################

# Wait 1 second to ensure Hyprland is initialized.
# Starts the Hyprland-specific portal for screenshots, screensharing, etc.
exec-once = sleep 1 && /usr/lib/xdg-desktop-portal-hyprland -r

# Wait 3 seconds to ensure Hyprland and its portal are ready.
# Starts the main portal service (connects apps to correct backends like Hyprland, GNOME, GTK).
exec-once = sleep 3 && /usr/lib/xdg-desktop-portal -r

#################
### AUTOSTART ###
#################
# Autostart necessary processes (like notifications daemons, status bars, etc.)

# Static wallpaper setup.
#exec-once = swww-daemon #Starts the wallpaper daemon (swww) to allow dynamic wallpaper changes
exec = hyprpaper

# Dynamic Wallpaper
#exec = mpvpaper -o "--loop-file inf --speed=1.0 --cache=no --mute=yes" '*' /home/B0LD/Videos/Wallpapers/ #Live wallpaper

exec = waybar 
exec = swaync

exec-once = systemctl --user start xdg-desktop-portal
exec-once = systemctl --user start xdg-desktop-portal-gtk

# Or execute your favorite apps at launch like this:
# exec-once = $terminal

##################################
##### ENVIRONMENT VARIABLES ######
##################################
# Refer to https://wiki.hyprland.org/Configuring/Variables/
# https://wiki.hyprland.org/Configuring/Variables/#general

# NVIDIA GPU-specific configuration
env = LIBVA_DRIVER_NAME,nvidia                 # VAAPI decode via NVIDIA
env = __GLX_VENDOR_LIBRARY_NAME,nvidia         # Use NVIDIA GLX vendor
env = NVD_BACKEND,direct                       # Direct NVDEC/NVENC path

# Core Wayland settings
env = XDG_SESSION_TYPE,wayland                 # Set session type to Wayland
env = QT_QPA_PLATFORM,wayland-egl              # Qt apps use Wayland EGL
env = QT_WAYLAND_FORCE_DPI,physical            # Qt uses monitor DPI
env = QT_STYLE_OVERRIDE,gtk2                   # Qt theme override
env = MOZ_ENABLE_WAYLAND,1                     # Firefox Wayland support

# Electron apps
env = ELECTRON_OZONE_PLATFORM_HINT,wayland     # Use native Wayland backend

# GTK3
env = LD_PRELOAD,/usr/lib/libgtk-nocsd.so.0   # Disable client-side decorations

#QT
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

##################################
###     DBUS + SYSTEMD SYNC    ###
##################################

# Exports environment variables for apps launched via DBus (Flatpaks, etc.)
exec-once = dbus-update-activation-environment --all

# Ensures systemd user services get the correct Wayland-related environment
exec-once = systemctl --user import-environment --quiet \
	    WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE QT_QPA_PLATFORM WLR_NO_HARDWARE_CURSORS

#Global settings
	    general {
		    gaps_in = 3                     # Gap between windows inside the workspace
			    gaps_out = 10                   	# Gap between windows and the screen edge
			    border_size = 2                 # Border size for the windows

# Active window border color (using RGBA format)
			    col.active_border = rgba(FFFFFFaa) 
# Inactive window border color (using RGBA format)
			    col.inactive_border = rgba(808080aa)

# Enable resizing windows by clicking and dragging on borders and gaps
			    resize_on_border = false

# Set to false to disable screen tearing (for smoother rendering)
			    allow_tearing = false

			    layout = dwindle                # Default window layout: dwindle (tiling layout)
	    }

# Configuration for window decoration appearance
decoration {

	rounding = 4                   # Corner radius for window borders
		rounding_power = 1 # Rounding intensity (power of the radius)

# Transparency of active and inactive windows
		active_opacity = 1
#inactive_opacity = 0.9

# Shadow settings for window decorations
		shadow {
			enabled = false              # Enable window shadows
				range = 4                   # Shadow size
				render_power = 10            # Shadow rendering intensity
				color = rgba(000000ee)      # Shadow color (RGBA format)
		}

# Blur effect settings for the background and windows
	blur {
		enabled = true               # Enable background blur
			size = 2                     # Blur intensity (larger value means stronger blur)
			passes = 4                   # Number of blur passes
			brightness = 0.6
			vibrancy = 4
			new_optimizations = true
	}
}

# Animation settings for window and workspace transitions
animations {
	enabled = yes, please :)        # Enable animations

# Various predefined animation bezier curves for different effects
		bezier = easeOutQuint,0.23,1,0.32,1
		bezier = easeInOutCubic,0.65,0.05,0.36,1
		bezier = linear,0,0,1,1
		bezier = almostLinear,0.5,0.5,0.75,1.0
		bezier = quick,0.15,0,0.1,1

# Global window transition animation settings
		animation = global, 1, 10, default
		animation = border, 1, 5.39, easeOutQuint
		animation = windows, 1, 4.79, easeOutQuint
		animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
		animation = windowsOut, 1, 1.49, linear, popin 87%
		animation = fadeIn, 1, 1.73, almostLinear
		animation = fadeOut, 1, 1.46, almostLinear
		animation = fade, 1, 3.03, quick
		animation = layers, 1, 3.81, easeOutQuint
		animation = layersIn, 1, 4, easeOutQuint, fade
		animation = layersOut, 1, 1.5, linear, fade
		animation = fadeLayersIn, 1, 1.79, almostLinear
		animation = fadeLayersOut, 1, 1.39, almostLinear
		animation = workspaces, 1, 1.94, almostLinear, fade
		animation = workspacesIn, 1, 1.21, almostLinear, fade
		animation = workspacesOut, 1, 1.94, almostLinear, fade
}

# Dwindle layout specific configurations
dwindle {
	pseudotile = true               # Enable pseudotiling in dwindle layout
		preserve_split = true           # Keep the window split when switching layouts
}

# Master layout specific configurations
master {
	new_status = master             # Define window behavior for new windows in master layout
}

# Miscellaneous global settings
misc {
	vrr = 0                         # Vertical refresh rate (set to 0 to disable)
		force_default_wallpaper = -1    # Set to -1 to use the default wallpaper
		disable_hyprland_logo = true    # Disable the random Hyprland logo or anime girl background
}

#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
	kb_layout = us
		kb_variant =
		kb_model =
		kb_options =
		kb_rules =

		follow_mouse = 1

		sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
		accel_profile = flat

		touchpad {
			natural_scroll = false
		}
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
#gestures {
#    workspace_swipe = false
#}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
	name = epic-mouse-v1
		sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
     bind = $mainMod, M, exit,
     bind = $mainMod, E, exec, $fileManager
     bind = $mainMod, V, togglefloating,
     bind = $mainMod, R, exec, $menu
     bind = $mainMod, P, pseudo, # dwindle
     bind = $mainMod, S, togglesplit, # dwindle
     bind = $mainMod, A, exec, $volumeControl
     bind = $mainMod, D, exec, $calculator
     bind = $mainMod SHIFT, F1, exec, /usr/bin/hyprshot -m region -o ~/Pictures/Screenshots/
     bind = $mainMod, F1, exec, /usr/bin/hyprshot --clipboard-only -m region -o ~/Pictures/Screenshots/
     bind = $mainMod SHIFT, F2, exec, /usr/bin/hyprshot -m output -o ~/Pictures/Screenshots/
     bind = $mainMod, F2, exec, /usr/bin/hyprshot --clipboard-only -m output -o ~/Pictures/Screenshots/
     bind = $mainMod, F3, exec, /usr/bin/hyprpicker --autocopy

# Move focus with mainMod + hjkl (nvim style)
     bind = $mainMod, h, movefocus, l
     bind = $mainMod, l, movefocus, r
     bind = $mainMod, k, movefocus, u
     bind = $mainMod, j, movefocus, d

# Switch workspaces with mainMod + [0-9]
     bind = $mainMod, 1, workspace, 1
     bind = $mainMod, 2, workspace, 2
     bind = $mainMod, 3, workspace, 3
     bind = $mainMod, 4, workspace, 4
     bind = $mainMod, 5, workspace, 5
     bind = $mainMod, 6, workspace, 6

# Move active window to a workspace with mainMod + SHIFT + [0-9]
     bind = $mainMod SHIFT, 1, movetoworkspace, 1
     bind = $mainMod SHIFT, 2, movetoworkspace, 2
     bind = $mainMod SHIFT, 3, movetoworkspace, 3
     bind = $mainMod SHIFT, 4, movetoworkspace, 4
     bind = $mainMod SHIFT, 5, movetoworkspace, 5
     bind = $mainMod SHIFT, 6, movetoworkspace, 6

# Example special workspace (scratchpad)
     bind = $mainMod, S, togglespecialworkspace, magic
     bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
     bind = $mainMod, mouse_down, workspace, e+1
     bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
     bindm = $mainMod, mouse:272, movewindow
     bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
     bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
     bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
     bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
     bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
     bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
     bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
     bindl = , XF86AudioNext, exec, playerctl next
     bindl = , XF86AudioPause, exec, playerctl play-pause
     bindl = , XF86AudioPlay, exec, playerctl play-pause
     bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

windowrule {
    name = gamescope
    	match:class = ^(gamescope)$
    	no_blur = 1
    	no_shadow = 1
    	immediate = 1
}

windowrule {
	name = pavucontrol-float
		match:class = ^(org.pulseaudio.pavucontrol)$
		float = true
		size = 603 675
		move = (cursor_x-(window_w*0.5)) (cursor_y-(window_h*0.5))
}

windowrule {
	name = qalculate-float
		match:class = ^(qalculate-gtk)$
		float = true
		size = 416 589
		move = (cursor_x-(window_w*0.5)) (cursor_y-(window_h*0.5))
}

windowrule {
	name = performance-fullscreen
	match:fullscreen = 1
	no_blur = on
}

# Game monitor setup
workspace = 1, persistent:true, monitor:$game_monitor, default:true
workspace = 2, persistent:true, monitor:$game_monitor
workspace = 3, persistent:true, monitor:$game_monitor

# Work monitor setup
workspace = 4, persistent:true, monitor:$work_monitor, default:true
workspace = 5, persistent:true, monitor:$work_monitor
workspace = 6, persistent:true, monitor:$work_monitor

################
### XWAYLAND ###
################

xwayland {
	force_zero_scaling = true
}
